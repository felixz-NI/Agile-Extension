<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agile Preview settings</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1f2933;
      --muted: #6b7785;
      --border: #e2e6ea;
      --accent: #03A378;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 280px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      color: var(--fg);
      background: var(--bg);
    }
    header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }
    header p {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--muted);
    }
    .list { padding: 6px 0; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 14px;
    }
    .row:hover { background: #f5f7f9; }
    .label { display: flex; flex-direction: column; }
    .label .name { font-weight: 500; }
    .label .desc { font-size: 11px; color: var(--muted); }
    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex: 0 0 auto;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #c5ccd3;
      border-radius: 20px;
      transition: background 0.15s ease;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(16px); }
    footer {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    button {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #f5f7f9;
      cursor: pointer;
    }
    button:hover { background: #eaeef1; }
  </style>
</head>
<body>
  <header>
    <h1>Inline Preview buttons</h1>
    <p>Toggle which buttons appear on Agile pages.</p>
  </header>
  <div class="list" id="list"></div>
  <footer>
    <button id="enableAll" type="button">Enable all</button>
    <button id="disableAll" type="button">Disable all</button>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
